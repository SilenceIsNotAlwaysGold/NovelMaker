抽象情感:
  - 心中涌起一股复杂的情感
  - 内心深处泛起层层涟漪
  - 一种说不清道不明的感觉
  - 心里五味杂陈
  - 心中百感交集
  - 内心翻涌

# 感受模式（正则表达式）
feeling_patterns:
  - "[他她]感到"
  - "[他她]觉得"
  - "[他她]感觉到"
  - "[他她]意识到"
  - "[他她]不禁"
  - "心中涌起"
  - "心头一[紧颤震]"

# 评分阈值
thresholds:
  excellent: 5      # <=5: 优秀
  ok: 15            # <=15: 一般
  poor: 30          # <=30: 较差
  # >30: 严重
